<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Barbados</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #4ade80;
    }

    .btn {
      background: #4ade80;
      color: black;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      padding: 80px 60px;
      text-align: center;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
      font-size: 18px;
    }

    .panel {
      margin: 40px auto;
      width: 80%;
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .card h2 {
      color: #4ade80;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Barbados</div>
  <a class="btn" href="#">Начать обмен</a>
</header>

<section class="hero">
  <h1>Быстрый и безопасный обмен</h1>
  <p>Криптовалюта и электронные валюты за несколько минут</p>
</section>

<section class="panel">
  <div class="card">
    <h2>1 200+</h2>
    <p>Пользователей</p>
  </div>

  <div class="card">
    <h2>0.5%</h2>
    <p>Комиссия</p>
  </div>

  <div class="card">
    <h2>24/7</h2>
    <p>Поддержка</p>
  </div>
</section>

<footer>
  © 2026 Barbados Exchange
</footer>

</body>
</html>
